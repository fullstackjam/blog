<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="900" height="420" rx="16" fill="url(#bg3)"/>
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E3A5F">MBR 与 EFI 分区对比</text>

  <!-- MBR Side -->
  <g filter="url(#shadow3)">
    <rect x="40" y="65" width="390" height="310" rx="14" fill="#fff" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="235" y="95" text-anchor="middle" font-size="16" font-weight="600" fill="#92400E">BIOS / MBR（传统）</text>

    <!-- Disk representation -->
    <rect x="70" y="115" width="330" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="235" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">磁盘布局</text>

    <!-- MBR sector -->
    <rect x="70" y="170" width="80" height="90" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="110" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">MBR</text>
    <text x="110" y="208" text-anchor="middle" font-size="10" fill="#64748B">512 字节</text>
    <text x="110" y="223" text-anchor="middle" font-size="9" fill="#64748B">扇区 0</text>
    <text x="110" y="248" text-anchor="middle" font-size="9" fill="#94A3B8">引导代码</text>

    <!-- Partition table detail -->
    <rect x="165" y="170" width="105" height="90" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="217" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">分区表</text>
    <text x="217" y="222" text-anchor="middle" font-size="9" fill="#64748B">4 个主分区</text>
    <text x="217" y="250" text-anchor="middle" font-size="9" fill="#94A3B8">64 字节</text>

    <!-- Partitions -->
    <rect x="285" y="170" width="115" height="90" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
    <text x="342" y="193" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">分区</text>
    <text x="342" y="210" text-anchor="middle" font-size="9" fill="#64748B">/dev/sda1</text>
    <text x="342" y="224" text-anchor="middle" font-size="9" fill="#64748B">/dev/sda2</text>
    <text x="342" y="238" text-anchor="middle" font-size="9" fill="#64748B">/dev/sda3 ...</text>

    <!-- MBR limits -->
    <text x="235" y="290" text-anchor="middle" font-size="11" fill="#64748B">最大磁盘：2 TB</text>
    <text x="235" y="308" text-anchor="middle" font-size="11" fill="#64748B">最多 4 个主分区</text>
    <text x="235" y="326" text-anchor="middle" font-size="11" fill="#64748B">引导代码：446 字节</text>
    <text x="235" y="350" text-anchor="middle" font-size="10" fill="#94A3B8">引导签名：0x55AA（最后 2 字节）</text>
  </g>

  <!-- EFI Side -->
  <g filter="url(#shadow3)">
    <rect x="470" y="65" width="390" height="310" rx="14" fill="#fff" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="665" y="95" text-anchor="middle" font-size="16" font-weight="600" fill="#1E40AF">UEFI / GPT（现代）</text>

    <!-- Disk representation -->
    <rect x="500" y="115" width="330" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="665" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">磁盘布局</text>

    <!-- Protective MBR -->
    <rect x="500" y="170" width="65" height="90" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="532" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">保护性</text>
    <text x="532" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">MBR</text>
    <text x="532" y="228" text-anchor="middle" font-size="8" fill="#94A3B8">兼容</text>

    <!-- GPT Header -->
    <rect x="575" y="170" width="75" height="90" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="612" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#5B21B6">GPT</text>
    <text x="612" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#5B21B6">头部</text>
    <text x="612" y="228" text-anchor="middle" font-size="8" fill="#94A3B8">分区</text>
    <text x="612" y="240" text-anchor="middle" font-size="8" fill="#94A3B8">条目</text>

    <!-- EFI System Partition -->
    <rect x="660" y="170" width="85" height="90" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="702" y="193" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">EFI 系统</text>
    <text x="702" y="206" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">分区</text>
    <text x="702" y="224" text-anchor="middle" font-size="8" fill="#64748B">FAT32</text>
    <text x="702" y="236" text-anchor="middle" font-size="8" fill="#64748B">~200 MB</text>
    <text x="702" y="250" text-anchor="middle" font-size="8" fill="#94A3B8">.efi 文件</text>

    <!-- Data partitions -->
    <rect x="755" y="170" width="75" height="90" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
    <text x="792" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">数据</text>
    <text x="792" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">分区</text>
    <text x="792" y="228" text-anchor="middle" font-size="8" fill="#64748B">ext4, xfs</text>
    <text x="792" y="240" text-anchor="middle" font-size="8" fill="#64748B">swap ...</text>

    <!-- GPT advantages -->
    <text x="665" y="290" text-anchor="middle" font-size="11" fill="#64748B">最大磁盘：9.4 ZB</text>
    <text x="665" y="308" text-anchor="middle" font-size="11" fill="#64748B">最多 128 个分区</text>
    <text x="665" y="326" text-anchor="middle" font-size="11" fill="#64748B">CRC32 校验保证完整性</text>
    <text x="665" y="350" text-anchor="middle" font-size="10" fill="#94A3B8">磁盘末尾有备份 GPT</text>
  </g>

  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#94A3B8">blog.fullstackjam.com</text>
</svg>