<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow6">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="arr6" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="900" height="450" rx="16" fill="url(#bg6)"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E40AF">Linux Kernel: Loading &amp; Initialization</text>

  <!-- Top row: loading sequence -->
  <g filter="url(#shadow6)">
    <rect x="30" y="60" width="195" height="100" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="127" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Decompress</text>
    <line x1="50" y1="96" x2="205" y2="96" stroke="#E2E8F0" stroke-width="1"/>
    <text x="127" y="116" text-anchor="middle" font-size="11" fill="#334155">vmlinuz is compressed</text>
    <text x="127" y="132" text-anchor="middle" font-size="11" fill="#334155">(gzip/bzip2/xz/zstd)</text>
    <text x="127" y="150" text-anchor="middle" font-size="10" fill="#94A3B8">Self-extracting image</text>
  </g>
  <line x1="225" y1="110" x2="245" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arr6)"/>

  <g filter="url(#shadow6)">
    <rect x="245" y="60" width="195" height="100" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="342" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Memory Setup</text>
    <line x1="265" y1="96" x2="420" y2="96" stroke="#E2E8F0" stroke-width="1"/>
    <text x="342" y="116" text-anchor="middle" font-size="11" fill="#334155">Page tables, MMU</text>
    <text x="342" y="132" text-anchor="middle" font-size="11" fill="#334155">Virtual memory init</text>
    <text x="342" y="150" text-anchor="middle" font-size="10" fill="#94A3B8">Memory zones, NUMA</text>
  </g>
  <line x1="440" y1="110" x2="460" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arr6)"/>

  <g filter="url(#shadow6)">
    <rect x="460" y="60" width="195" height="100" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="557" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Hardware Init</text>
    <line x1="480" y1="96" x2="635" y2="96" stroke="#E2E8F0" stroke-width="1"/>
    <text x="557" y="116" text-anchor="middle" font-size="11" fill="#334155">CPU, IRQ, timers</text>
    <text x="557" y="132" text-anchor="middle" font-size="11" fill="#334155">Built-in drivers load</text>
    <text x="557" y="150" text-anchor="middle" font-size="10" fill="#94A3B8">PCI, ACPI, I/O</text>
  </g>
  <line x1="655" y1="110" x2="675" y2="110" stroke="#2563EB" stroke-width="2" marker-end="url(#arr6)"/>

  <g filter="url(#shadow6)">
    <rect x="675" y="60" width="195" height="100" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="772" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Start PID 1</text>
    <line x1="695" y1="96" x2="850" y2="96" stroke="#E2E8F0" stroke-width="1"/>
    <text x="772" y="116" text-anchor="middle" font-size="11" fill="#334155">Mount initramfs</text>
    <text x="772" y="132" text-anchor="middle" font-size="11" fill="#334155">Execute /sbin/init</text>
    <text x="772" y="150" text-anchor="middle" font-size="10" fill="#94A3B8">Userspace begins</text>
  </g>

  <!-- Bottom: Kernel subsystems -->
  <g filter="url(#shadow6)">
    <rect x="30" y="195" width="840" height="220" rx="14" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="225" text-anchor="middle" font-size="15" font-weight="600" fill="#1E40AF">Kernel Subsystems</text>

    <!-- Row 1 -->
    <rect x="55" y="242" width="155" height="68" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="132" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Process Mgmt</text>
    <text x="132" y="282" text-anchor="middle" font-size="10" fill="#64748B">Scheduler, fork()</text>
    <text x="132" y="296" text-anchor="middle" font-size="10" fill="#64748B">Threads, signals</text>

    <rect x="225" y="242" width="155" height="68" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
    <text x="302" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Memory Mgmt</text>
    <text x="302" y="282" text-anchor="middle" font-size="10" fill="#64748B">Virtual memory</text>
    <text x="302" y="296" text-anchor="middle" font-size="10" fill="#64748B">Page cache, swap</text>

    <rect x="395" y="242" width="155" height="68" rx="8" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="472" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">VFS / Filesystems</text>
    <text x="472" y="282" text-anchor="middle" font-size="10" fill="#64748B">ext4, XFS, Btrfs</text>
    <text x="472" y="296" text-anchor="middle" font-size="10" fill="#64748B">Block I/O layer</text>

    <rect x="565" y="242" width="155" height="68" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <text x="642" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Networking</text>
    <text x="642" y="282" text-anchor="middle" font-size="10" fill="#64748B">TCP/IP stack</text>
    <text x="642" y="296" text-anchor="middle" font-size="10" fill="#64748B">Socket layer, netfilter</text>

    <rect x="735" y="242" width="110" height="68" rx="8" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1"/>
    <text x="790" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#9F1239">Device</text>
    <text x="790" y="282" text-anchor="middle" font-size="10" fill="#64748B">Drivers</text>
    <text x="790" y="296" text-anchor="middle" font-size="10" fill="#64748B">Modules</text>

    <!-- Row 2 -->
    <rect x="55" y="325" width="250" height="55" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="180" y="349" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">System Calls (syscall interface)</text>
    <text x="180" y="367" text-anchor="middle" font-size="10" fill="#64748B">Bridge between userspace and kernel</text>

    <rect x="320" y="325" width="250" height="55" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="445" y="349" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Security (SELinux / AppArmor)</text>
    <text x="445" y="367" text-anchor="middle" font-size="10" fill="#64748B">Access control, capabilities</text>

    <rect x="585" y="325" width="260" height="55" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="715" y="349" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">IPC (Inter-Process Comm.)</text>
    <text x="715" y="367" text-anchor="middle" font-size="10" fill="#64748B">Pipes, shared memory, sockets</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-size="10" fill="#94A3B8">blog.fullstackjam.com</text>
</svg>