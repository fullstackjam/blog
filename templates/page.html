{% extends "base.html" %}

{% block content %}
<a id="title" href="{{ page.permalink | safe }}">{{ page.title | safe }}</a>
{% if page.translations %}{% for trans in page.translations %}{% if trans.lang != lang %}<div id="date"><a href="{{ trans.permalink | safe }}" class="lang-switch">{% if trans.lang == "en" %}EN{% else %}中文{% endif %}</a></div>{% endif %}{% endfor %}{% endif %}
<div id="content">
{{ page.content | safe }}
</div>
{% endblock content %}
