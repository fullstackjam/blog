<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="900" height="560" rx="16" fill="url(#bg1)"/>
  <text x="450" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E40AF">Linux Boot Process Overview</text>

  <!-- Step boxes connected by arrows -->
  <g filter="url(#shadow1)">
    <rect x="340" y="70" width="220" height="54" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="93" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Power On</text>
    <text x="450" y="111" text-anchor="middle" font-size="11" fill="#64748B">Hardware receives power</text>
  </g>
  <line x1="450" y1="124" x2="450" y2="148" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow1)">
    <rect x="340" y="148" width="220" height="54" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="171" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">BIOS / UEFI</text>
    <text x="450" y="189" text-anchor="middle" font-size="11" fill="#64748B">POST &amp; hardware init</text>
  </g>
  <line x1="450" y1="202" x2="450" y2="226" stroke="#2563EB" stroke-width="2"/>

  <g filter="url(#shadow1)">
    <rect x="340" y="226" width="220" height="54" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="249" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Boot Loader (GRUB)</text>
    <text x="450" y="267" text-anchor="middle" font-size="11" fill="#64748B">Stage 1 + Stage 2</text>
  </g>
  <line x1="450" y1="280" x2="450" y2="304" stroke="#2563EB" stroke-width="2"/>

  <g filter="url(#shadow1)">
    <rect x="340" y="304" width="220" height="54" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="327" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Kernel</text>
    <text x="450" y="345" text-anchor="middle" font-size="11" fill="#64748B">Decompress, init hardware</text>
  </g>
  <line x1="450" y1="358" x2="450" y2="382" stroke="#2563EB" stroke-width="2"/>

  <g filter="url(#shadow1)">
    <rect x="340" y="382" width="220" height="54" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="405" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">initramfs</text>
    <text x="450" y="423" text-anchor="middle" font-size="11" fill="#64748B">Mount root filesystem</text>
  </g>
  <line x1="450" y1="436" x2="450" y2="460" stroke="#2563EB" stroke-width="2"/>

  <g filter="url(#shadow1)">
    <rect x="340" y="460" width="220" height="54" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="450" y="483" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">init / systemd (PID 1)</text>
    <text x="450" y="501" text-anchor="middle" font-size="11" fill="#64748B">Start services &amp; login</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Stage labels on the left -->
  <text x="320" y="98" text-anchor="end" font-size="11" fill="#94A3B8">Stage 0</text>
  <text x="320" y="176" text-anchor="end" font-size="11" fill="#94A3B8">Stage 1</text>
  <text x="320" y="254" text-anchor="end" font-size="11" fill="#94A3B8">Stage 2</text>
  <text x="320" y="332" text-anchor="end" font-size="11" fill="#94A3B8">Stage 3</text>
  <text x="320" y="410" text-anchor="end" font-size="11" fill="#94A3B8">Stage 4</text>
  <text x="320" y="488" text-anchor="end" font-size="11" fill="#94A3B8">Stage 5</text>

  <!-- Arrows between stages -->
  <line x1="450" y1="124" x2="450" y2="148" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="202" x2="450" y2="226" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="280" x2="450" y2="304" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="358" x2="450" y2="382" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="436" x2="450" y2="460" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="450" y="545" text-anchor="middle" font-size="10" fill="#94A3B8">blog.fullstackjam.com</text>
</svg>