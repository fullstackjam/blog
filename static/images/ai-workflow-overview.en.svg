<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="blueBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="amberBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>

  <!-- Claude Code main area -->
  <rect x="20" y="20" width="560" height="480" rx="16" fill="url(#blueBg)" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="40" y="56" font-size="18" font-weight="700" fill="#1E40AF">Claude Code</text>
  <text x="178" y="56" font-size="14" fill="#3B82F6">Main Dev</text>
  <rect x="460" y="34" width="54" height="28" rx="14" fill="#2563EB"/>
  <text x="487" y="53" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">70%</text>

  <!-- Opus 4.8 card -->
  <rect x="44" y="80" width="244" height="130" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="64" y="110" font-size="15" font-weight="600" fill="#1E3A5F">Opus 4.8</text>
  <text x="64" y="134" font-size="13" fill="#64748B">Complex feature dev</text>
  <text x="64" y="154" font-size="13" fill="#64748B">Architecture design</text>
  <text x="64" y="174" font-size="13" fill="#64748B">Tricky bug debugging</text>
  <text x="64" y="194" font-size="12" fill="#94A3B8">Enabled for deep reasoning tasks</text>

  <!-- Sonnet 4.6 card -->
  <rect x="312" y="80" width="244" height="130" rx="12" fill="#fff" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="446" y="88" width="60" height="20" rx="10" fill="#D1FAE5"/>
  <text x="476" y="102" font-size="10" font-weight="500" fill="#059669" text-anchor="middle">Default</text>
  <text x="332" y="110" font-size="15" font-weight="600" fill="#1E3A5F">Sonnet 4.6</text>
  <text x="332" y="134" font-size="13" fill="#64748B">Daily dev tasks</text>
  <text x="332" y="154" font-size="13" fill="#64748B">Batch edits / write tests</text>
  <text x="332" y="174" font-size="13" fill="#64748B">Boilerplate code</text>
  <text x="332" y="194" font-size="12" fill="#94A3B8">Fast &amp; stable, first choice for most tasks</text>

  <!-- Down arrow -->
  <path d="M300,218 L300,248" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="294,246 300,256 306,246" fill="#93C5FD"/>
  <text x="310" y="240" font-size="11" fill="#93C5FD">Code done</text>

  <!-- Codex Review area -->
  <rect x="44" y="264" width="512" height="100" rx="12" fill="url(#amberBg)" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="68" y="296" font-size="15" font-weight="600" fill="#92400E">Codex Cross Review</text>
  <text x="256" y="296" font-size="13" fill="#B45309">via Codex in Claude plugin</text>
  <text x="68" y="320" font-size="13" fill="#78716C">GPT 5.5 review</text>
  <text x="68" y="342" font-size="12" fill="#A8A29E">Opus + GPT 5.5 are both SOTA — top-tier mutual review matters</text>

  <!-- Review loop arrow -->
  <path d="M556,314 C576,314 576,168 556,168" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowAmber)"/>
  <defs>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F59E0B"/>
    </marker>
  </defs>
  <text x="562" y="250" font-size="10" fill="#D97706" transform="rotate(-90,562,250)">Issue found → Fix</text>

  <!-- Claude Code bottom divider and note -->
  <line x1="44" y1="388" x2="556" y2="388" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="44" y="412" font-size="12" fill="#64748B">Some tasks don't need Codex review — Claude's output is already solid</text>

  <!-- Middle divider -->
  <line x1="605" y1="60" x2="605" y2="460" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,6"/>

  <!-- OpenCode area -->
  <rect x="630" y="20" width="250" height="480" rx="16" fill="url(#greenBg)" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="56" font-size="18" font-weight="700" fill="#065F46">OpenCode</text>
  <text x="760" y="56" font-size="14" fill="#10B981">Misc Tasks</text>
  <rect x="816" y="34" width="54" height="28" rx="14" fill="#059669"/>
  <text x="843" y="53" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">30%</text>

  <!-- Model info -->
  <rect x="650" y="74" width="210" height="48" rx="8" fill="#fff" stroke="#A7F3D0" stroke-width="1"/>
  <text x="666" y="95" font-size="12" fill="#64748B">Model: GPT 5.5 / DeepSeek V4 Pro</text>
  <text x="666" y="112" font-size="11" fill="#94A3B8">+ Oh my openAgent plugin</text>

  <!-- Cron jobs card -->
  <rect x="650" y="142" width="210" height="120" rx="12" fill="#fff" stroke="#A7F3D0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="170" font-size="14" font-weight="600" fill="#1E3A5F">Multica Cron Jobs</text>
  <text x="670" y="194" font-size="12" fill="#64748B">Code check / dep scan</text>
  <text x="670" y="214" font-size="12" fill="#64748B">Auto claim, execute, report</text>
  <text x="670" y="242" font-size="11" fill="#94A3B8">Fully logged, always auditable</text>

  <!-- Lark task dispatch card -->
  <rect x="650" y="282" width="210" height="140" rx="12" fill="#fff" stroke="#A7F3D0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="310" font-size="14" font-weight="600" fill="#1E3A5F">Lark Task Dispatch</text>
  <text x="670" y="334" font-size="12" fill="#64748B">Lark Bridge to local env</text>
  <text x="670" y="358" font-size="12" fill="#64748B">Check API / edit config / run lint</text>
  <text x="670" y="382" font-size="12" fill="#64748B">Handle tasks on the go</text>
  <text x="670" y="406" font-size="11" fill="#94A3B8">WebSocket persistent, streaming cards</text>

  <!-- OpenCode advantage labels -->
  <rect x="650" y="440" width="210" height="48" rx="8" fill="rgba(255,255,255,0.7)" stroke="#A7F3D0" stroke-width="1"/>
  <text x="666" y="460" font-size="11" fill="#059669">fallback auto-switch · CLAUDE.md compat</text>
  <text x="666" y="476" font-size="11" fill="#059669">agents.md · .claude/skills</text>
</svg>
